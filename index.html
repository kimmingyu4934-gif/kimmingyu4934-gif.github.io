<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뱀 게임</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111827;
      font-family: Arial, sans-serif;
      color: white;
    }
    .wrap {
      text-align: center;
      background: #1f2937;
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 10px; }
    .info {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
      font-size: 18px;
      font-weight: bold;
    }
    canvas {
      background: #020617;
      border: 3px solid #374151;
      border-radius: 12px;
      display: block;
    }
    .help {
      margin-top: 12px;
      color: #cbd5e1;
      font-size: 14px;
    }
    button {
      margin-top: 14px;
      padding: 10px 16px;
      border: 0;
      border-radius: 10px;
      background: #22c55e;
      color: #052e16;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.08); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🐍 뱀 게임</h1>
    <div class="info">
      <div>점수: <span id="score">0</span></div>
      <div>최고점수: <span id="best">0</span></div>
    </div>
    <canvas id="game" width="420" height="420"></canvas>
    <div class="help">방향키 또는 WASD로 이동 · 스페이스바로 일시정지</div>
    <button onclick="restartGame()">다시 시작</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');

    const tile = 21;
    const count = canvas.width / tile;

    let snake, food, dx, dy, nextDx, nextDy, score, best, paused, gameOver;

    best = Number(localStorage.getItem('snakeBest') || 0);
    bestEl.textContent = best;

    function reset() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      dx = 1;
      dy = 0;
      nextDx = 1;
      nextDy = 0;
      score = 0;
      paused = false;
      gameOver = false;
      scoreEl.textContent = score;
      placeFood();
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * count),
          y: Math.floor(Math.random() * count)
        };
      } while (snake.some(part => part.x === food.x && part.y === food.y));
    }

    function drawCell(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * tile + 1, y * tile + 1, tile - 2, tile - 2);
    }

    function drawGrid() {
      ctx.strokeStyle = '#111827';
      for (let i = 0; i <= count; i++) {
        ctx.beginPath();
        ctx.moveTo(i * tile, 0);
        ctx.lineTo(i * tile, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * tile);
        ctx.lineTo(canvas.width, i * tile);
        ctx.stroke();
      }
    }

    function drawMessage(text, subtext) {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'white';
      ctx.font = 'bold 34px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2 - 12);
      ctx.font = '16px Arial';
      ctx.fillText(subtext, canvas.width / 2, canvas.height / 2 + 24);
    }

    function update() {
      if (paused || gameOver) return;

      dx = nextDx;
      dy = nextDy;

      const head = {
        x: snake[0].x + dx,
        y: snake[0].y + dy
      };

      if (
        head.x < 0 || head.x >= count ||
        head.y < 0 || head.y >= count ||
        snake.some(part => part.x === head.x && part.y === head.y)
      ) {
        gameOver = true;
        if (score > best) {
          best = score;
          localStorage.setItem('snakeBest', best);
          bestEl.textContent = best;
        }
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        placeFood();
      } else {
        snake.pop();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawCell(food.x, food.y, '#ef4444');

      snake.forEach((part, index) => {
        drawCell(part.x, part.y, index === 0 ? '#86efac' : '#22c55e');
      });

      if (paused) drawMessage('일시정지', '스페이스바를 누르면 계속합니다');
      if (gameOver) drawMessage('게임 오버', '다시 시작 버튼을 누르세요');
    }

    function loop() {
      update();
      draw();
    }

    function restartGame() {
      reset();
      draw();
    }

    document.addEventListener('keydown', e => {
      const key = e.key.toLowerCase();

      if (key === ' ') {
        paused = !paused;
        draw();
        return;
      }

      if ((key === 'arrowup' || key === 'w') && dy !== 1) {
        nextDx = 0; nextDy = -1;
      } else if ((key === 'arrowdown' || key === 's') && dy !== -1) {
        nextDx = 0; nextDy = 1;
      } else if ((key === 'arrowleft' || key === 'a') && dx !== 1) {
        nextDx = -1; nextDy = 0;
      } else if ((key === 'arrowright' || key === 'd') && dx !== -1) {
        nextDx = 1; nextDy = 0;
      }
    });

    reset();
    setInterval(loop, 110);
  </script>
</body>
</html>
